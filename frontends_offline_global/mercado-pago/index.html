<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Gateway Admin | Mercado Pago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <style>
      .section { height: 100%; overflow-y: auto; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body class="app-root">
    <main class="app-content">
      <header class="h-16 flex items-center justify-between px-4 border-b mb-4">
        <h2 id="section-title" class="text-xl font-bold">Panel de Control</h2>
      </header>

      <!-- Sección: Clientes -->
      <section id="section-clients" class="section">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-lg font-bold text-slate-700">Listado de Clientes</h3>
          <button onclick="openModal('modal-client')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium">Nuevo Cliente</button>
        </div>
        <div id="clients-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
      </section>

      <!-- Sección: Cobros -->
      <section id="section-payments" class="section hidden">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-lg font-bold text-slate-700">Cobros del Cliente</h3>
        </div>
        <table class="w-full text-left">
          <tbody id="payments-table-body"></tbody>
        </table>
      </section>

      <!-- Sección: Monitoreo -->
      <section id="section-global_payments" class="section hidden">
        <h3 class="text-lg font-bold text-slate-700 mb-6">Monitoreo Global</h3>
        <table class="w-full text-left">
          <tbody id="global-payments-table-body"></tbody>
        </table>
      </section>

      <!-- Sección: Suscripciones -->
      <section id="section-subscriptions" class="section hidden">
        <h3 class="text-lg font-bold text-slate-700 mb-6">Planes Recurrentes</h3>
        <div id="subscriptions-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
      </section>
    </main>
    <script src="/js/init-dock.js" defer></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
