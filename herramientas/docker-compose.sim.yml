version: '3.8'

services:
  omnicore-db:
    image: postgres:15
    environment:
      POSTGRES_USER: omnicore_user
      POSTGRES_PASSWORD: omnicore_password
      POSTGRES_DB: omnicore_registry
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnicore_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  omnicore-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
